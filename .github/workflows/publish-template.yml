name: Publish to Release Repo

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview what would be published without pushing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  RELEASE_REPO: Digiata/Stadium-8

jobs:
  publish:
    name: Publish to release repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          path: dev-repo

      # GitHub App with Contents:write on the release repo.
      # Secrets: RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: Digiata
          repositories: Stadium-8

      - name: Checkout release repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: release-repo

      - name: Prepare staging directory
        run: |
          mkdir -p staging

          rsync -av \
            --exclude-from='dev-repo/.release-ignore' \
            --exclude='.git/' \
            dev-repo/ staging/

      - name: Preserve release repo README
        run: |
          if [ -f release-repo/README.md ]; then
            cp release-repo/README.md staging/README.md
            echo "Preserved release repo README.md"
          else
            echo "No README.md found in release repo — skipping"
          fi

      - name: Verify staging content
        run: |
          echo "=== Excluded files (should NOT appear) ==="
          for f in \
            ".template-docs/CONTRIBUTING.md" \
            ".template-docs/TEMPLATE_DEVELOPMENT.md" \
            ".release-ignore" \
            ".github/workflows/publish-template.yml"; do
            if [ -f "staging/$f" ]; then
              echo "FAIL: $f should have been excluded"
              exit 1
            else
              echo "OK: $f excluded"
            fi
          done

          echo ""
          echo "=== Key files (should appear) ==="
          for f in \
            "CLAUDE.md" \
            "CHANGELOG.md" \
            "web/package.json" \
            ".claude/settings.json" \
            ".github/workflows/pr-checks.yml" \
            ".github/workflows/sync-template.yml"; do
            if [ -f "staging/$f" ]; then
              echo "OK: $f present"
            else
              echo "FAIL: $f missing"
              exit 1
            fi
          done

          echo ""
          echo "=== File count ==="
          find staging -type f | wc -l

      - name: Configure release repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd release-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to release repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd release-repo

          rsync -a --delete --exclude='.git' ../staging/ .

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            COMMIT_MSG="release: ${{ github.event.release.tag_name }}"
          else
            COMMIT_MSG="release: manual publish from $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin main

          echo "Published to ${{ env.RELEASE_REPO }}"

      - name: Tag release repo
        if: ${{ github.event_name == 'release' && github.event.inputs.dry_run != 'true' }}
        run: |
          cd release-repo
          TAG="${{ github.event.release.tag_name }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Tagged ${{ env.RELEASE_REPO }} with $TAG"
          fi

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN — no changes pushed ==="
          echo ""
          echo "Files that would be published:"
          find staging -type f | sort
          echo ""
          echo "Total files: $(find staging -type f | wc -l)"
