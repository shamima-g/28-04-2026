name: Sync from Template

on:
  # schedule:
  #   - cron: '0 0 * * 0' # Weekly on Sundays at midnight UTC
  workflow_dispatch: # Manual trigger

env:
  RELEASE_REPO: Digiata/Stadium-8

jobs:
  sync:
    name: Sync with Template Repository
    # Only run in repos created from the template, not in the
    # dev repo or the release repo themselves.
    if: >-
      github.repository != 'stadium-software/stadium-8' &&
      github.repository != 'Digiata/Stadium-8'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # SSH deploy key setup — see .template-docs/Help/Template-Sync.md
      - name: Sync from template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: ${{ env.RELEASE_REPO }}
          upstream_branch: main
          pr_title: 'chore: sync with template repository'
          pr_labels: template-sync
          source_repo_ssh_private_key: ${{ secrets.TEMPLATE_SSH_PRIVATE_KEY }}
